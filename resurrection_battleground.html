<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부활론(Resurrection) 신학 전략 작전 지휘소 v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans KR', sans-serif; background-color: #010413; color: #f8fafc; }
        .glass-card { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .strategic-btn { transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.03); }
        .strategic-btn.active { border-color: currentColor; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px -5px currentColor; }
        .matchup-btn { transition: all 0.3s ease; border: 1px solid rgba(168, 85, 247, 0.3); }
        .matchup-btn:hover { background: rgba(168, 85, 247, 0.1); border-color: #a855f7; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .radar-container { filter: drop-shadow(0 0 40px rgba(0, 0, 0, 0.6)); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">
    <div class="max-w-[1750px] mx-auto">
        <!-- Dashboard Header -->
        <header class="mb-12 border-b border-white/5 pb-10 flex flex-col xl:flex-row justify-between items-start xl:items-end gap-8">
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <span class="px-2 py-0.5 bg-purple-600 text-[10px] font-black tracking-widest rounded-sm">TOP SECRET</span>
                    <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-br from-slate-100 to-slate-500 uppercase tracking-tighter">Resurrection Strategic HQ</h1>
                </div>
                <p class="text-slate-500 text-sm font-light uppercase tracking-[0.3em]">Theological Eschaton Analysis Platform v3.1</p>
            </div>
            <div id="matchupContainer" class="grid grid-cols-2 gap-3">
                <!-- Matchup buttons will be rendered here -->
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            <!-- Left: Unit Deployment -->
            <div class="xl:col-span-3">
                <div class="glass-card p-8 sticky top-12">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8 border-l-2 border-purple-600 pl-4">Tactical Units</h2>
                    <div id="layerSelector" class="space-y-3 pr-2 scroll-custom">
                        <!-- JS Renders -->
                    </div>
                </div>
            </div>

            <!-- Center: The Radar Battleground -->
            <div class="xl:col-span-6 flex flex-col gap-8">
                <div class="glass-card p-12 flex-1 radar-container min-h-[700px] relative">
                    <canvas id="mainRadarChart"></canvas>
                    <div class="absolute bottom-6 left-6 text-[10px] text-slate-700 font-mono">GRID SYSTEM ALPHA-9 / SECTOR: RESURRECTION</div>
                </div>
            </div>

            <!-- Right: Strategic Command -->
            <div class="xl:col-span-3">
                <div id="briefCard" class="glass-card h-full p-10 flex flex-col border-r-2 border-purple-500/20 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-10 relative z-10">
                        <h2 class="text-2xl font-black tracking-tighter flex items-center gap-3">
                            <span id="briefIcon" class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-sm">R</span>
                            STRATEGIC BRIEF
                        </h2>
                    </div>
                    
                    <div id="strategicBriefContent" class="flex-1 overflow-y-auto scroll-custom pr-4 space-y-8 relative z-10">
                        <div class="opacity-20 text-center py-40">
                            <p class="text-xs uppercase tracking-[0.5em] mb-4 font-black">Waiting for command</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scholars = [
            { 
                id: 0, name: '볼프하르트 판넨베르크', color: '#10b981', data: [10, 6, 2, 9, 3, 5, 10], group: 'History',
                strategy: "[Strategic Core: Universal History] 부활을 '일반 역사의 지평에서 검증 가능한 사실'로 취급합니다. 역사의 끝(종말)이 그리스도의 부활에서 미리 일어났다는 '종말론적 선취(Axis 4: 9점)'를 통해, 신학을 이성적 역사학의 심판대 위에 당당히 세우는 공격적 전술입니다."
            },
            { 
                id: 1, name: 'N.T. 라이트', color: '#38bdf8', data: [9, 10, 3, 8, 4, 9, 8], group: 'Anglican',
                strategy: "[Strategy: Physical Realism] 유대교적 맥락 속에서 '육체적 부활(Axis 2: 10점)'의 역사적 필연성을 변증합니다. 부활은 단순히 영혼의 불멸이 아니라, 일그러진 창조 세계를 혁신하시려는 하나님의 새로운 창조(Axis 6: 9점)의 시작임을 선포하는 구체적 존재론 전략입니다."
            },
            { 
                id: 2, name: '루돌프 불트만', color: '#94a3b8', data: [1, 2, 10, 3, 8, 2, 2], group: 'Existentialist',
                strategy: "[Strategy: Existential Interpretation] 빈 무덤과 같은 역사적 정보(Axis 1: 1점)를 부활의 본질에서 제거합니다. 부활은 과거의 사건이 아니라, 지금 말씀(케리그마)을 듣는 자 안에서 일어나는 '자아의 새로운 이해(Axis 3: 10점)'입니다. 역사적 회의주의를 실존적 타격력으로 전환하는 게릴라 전술입니다."
            },
            { 
                id: 3, name: '칼 바르트', color: '#ec4899', data: [4, 7, 7, 8, 10, 8, 5], group: 'Neo-Orthodox',
                strategy: "[Strategy: Sovereign Event] 부활은 역사의 산물이 아니라, 역사 안으로 틈입해 들어온 '하나님의 전적인 사건(Axis 5: 10점)'입니다. 역사학자의 렌즈(Historie)로는 보이지 않는, 오직 믿음의 눈(Geschichte)으로만 파악되는 초월적 실재를 기독론적 주권 안에서 구축합니다."
            },
            { 
                id: 4, name: '위르겐 몰트만', color: '#f59e0b', data: [6, 8, 5, 10, 7, 10, 6], group: 'Political/Hope',
                strategy: "[Strategy: Future of Hope] 부활을 고통받는 현실을 변혁시키는 '미래의 희망'으로 해석합니다. 십자가에 못 박히신 하나님이 만물을 새롭게 하시는 우주적 변혁(Axis 6: 10점)의 동력을 부활에서 찾아내어, 이를 정치적-윤리적 해방의 동력으로 연결하는 희망의 전술입니다."
            }
        ];

        const matchups = [
            { 
                title: "역사적 사실인가, 실존적 결단인가?", ids: [0, 2], 
                analysis: "판넨베르크 vs 불트만. 부활론의 가장 고전적인 전선입니다. 부활이 '역사적으로 증명되어야 하는 사건'인가, 아니면 '나를 무너뜨리는 의미의 사건'인가를 두고 격돌합니다. 전략 포인트: Axis 1(역사적 사실성)과 Axis 3(실존적 의미)의 극단적 대비를 확인하십시오."
            },
            { 
                title: "새 창조의 몸인가, 초역사적 사건인가?", ids: [1, 3], 
                analysis: "N.T. 라이트 vs 바르트. 부활의 '장소'를 묻습니다. 라이트는 이 땅의 흙으로 빚어진 몸의 갱신(Axis 2)을 강조하고, 바르트는 인간의 시간 체계를 넘어서는 하나님의 단독적 사건(Axis 5)임을 강조합니다."
            }
        ];

        let activeLayers = [true, true, true, true, true];
        let chart;

        const ctx = document.getElementById('mainRadarChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['역사적 사실성', '육체적 연속성', '실존적 의미', '종말론적 선취', '초역사적 사건', '우주적 변혁', '변증학적 비중'],
                    datasets: scholars.map((s, idx) => ({
                        label: s.name,
                        data: s.data,
                        borderColor: s.color,
                        backgroundColor: s.color + '10',
                        fill: true,
                        hidden: !activeLayers[idx],
                        pointRadius: 4,
                        borderWidth: 2
                    }))
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.05)' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            pointLabels: { color: '#475569', font: { size: 10, weight: '700' } },
                            ticks: { display: false, max: 10, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            renderUI();
            renderMatchups();
        }

        function renderUI() {
            const container = document.getElementById('layerSelector');
            container.innerHTML = scholars.map((s, idx) => `
                <button onclick="focusScholar(${idx})" 
                        class="strategic-btn w-full flex items-center gap-4 p-4 rounded-2xl text-left ${activeLayers[idx] ? 'active' : ''}" 
                        style="color: ${s.color}">
                    <div class="w-3 h-3 rounded-full shadow-[0_0_10px_currentColor]" style="background-color: ${s.color}"></div>
                    <div class="flex-1">
                        <div class="text-[12px] font-bold text-slate-100">${s.name}</div>
                        <div class="text-[8px] text-slate-500 font-mono uppercase tracking-widest">${s.group}</div>
                    </div>
                </button>
            `).join('');
        }

        function focusScholar(idx) {
            activeLayers[idx] = !activeLayers[idx];
            chart.data.datasets[idx].hidden = !activeLayers[idx];
            chart.update();
            renderUI();
            
            const container = document.getElementById('strategicBriefContent');
            const icon = document.getElementById('briefIcon');
            const s = scholars[idx];

            icon.innerText = "🧐";
            icon.style.backgroundColor = s.color;

            container.innerHTML = `
                <div class="space-y-8 animate-in slide-in-from-right-4 duration-500">
                    <header>
                        <h3 class="text-xs font-black uppercase tracking-[0.3em] mb-4" style="color: ${s.color}">${s.group} STRATEGIC Intel</h3>
                        <h4 class="text-5xl font-black text-white leading-none tracking-tighter mb-4">${s.name}</h4>
                    </header>
                    <div class="space-y-8">
                        <section>
                            <h5 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Theological Doctrine</h5>
                            <p class="text-slate-200 text-sm leading-[1.8]">${s.strategy}</p>
                        </section>
                    </div>
                </div>
            `;
        }

        function renderMatchups() {
            const container = document.getElementById('matchupContainer');
            container.innerHTML = matchups.map((m, idx) => `
                <button onclick="applyMatchup(${idx})" 
                        class="matchup-btn px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-[0.2em] text-purple-500 text-left leading-tight">
                    ${m.title}
                </button>
            `).join('');
        }

        function applyMatchup(idx) {
            const matchup = matchups[idx];
            activeLayers = activeLayers.map((_, i) => matchup.ids.includes(i));
            chart.data.datasets.forEach((d, i) => d.hidden = !matchup.ids.includes(i));
            chart.update();
            renderUI();
            
            const container = document.getElementById('strategicBriefContent');
            const icon = document.getElementById('briefIcon');
            icon.innerText = "⚔️";
            icon.style.backgroundColor = "#a855f7";

            container.innerHTML = `
                <div class="space-y-8 animate-in slide-in-from-right-4 duration-700">
                    <header>
                        <h3 class="text-purple-500 font-black text-[10px] uppercase tracking-[0.3em] mb-4">Tactical Engagement Report</h3>
                        <h4 class="text-4xl font-black text-white leading-tight tracking-tighter">${matchup.title}</h4>
                    </header>
                    <div class="prose prose-invert">
                        <p class="text-slate-300 text-sm leading-[1.8]">${matchup.analysis}</p>
                    </div>
                </div>
            `;
        }

        function toggleAll(val) {
            activeLayers = activeLayers.map(() => val);
            chart.data.datasets.forEach(d => d.hidden = !val);
            chart.update();
            renderUI();
        }

        initChart();
    </script>
</body>
</html>
