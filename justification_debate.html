<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>칭의론(Justification) 신학 전략 작전 지휘소 v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans KR', sans-serif; background-color: #010413; color: #f8fafc; }
        .glass-card { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .strategic-btn { transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.03); }
        .strategic-btn.active { border-color: currentColor; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px -5px currentColor; }
        .matchup-btn { transition: all 0.3s ease; border: 1px solid rgba(244, 63, 94, 0.3); }
        .matchup-btn:hover { background: rgba(244, 63, 94, 0.1); border-color: #f43f5e; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .radar-container { filter: drop-shadow(0 0 40px rgba(0, 0, 0, 0.6)); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">
    <div class="max-w-[1750px] mx-auto">
        <!-- Dashboard Header -->
        <header class="mb-12 border-b border-white/5 pb-10 flex flex-col xl:flex-row justify-between items-start xl:items-end gap-8">
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <span class="px-2 py-0.5 bg-rose-600 text-[10px] font-black tracking-widest rounded-sm">TOP SECRET</span>
                    <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-br from-slate-100 to-slate-500 uppercase tracking-tighter">Justification Strategic HQ</h1>
                </div>
                <p class="text-slate-500 text-sm font-light uppercase tracking-[0.3em]">Theological Ordo Salutis Analysis Platform v3.1</p>
            </div>
            <div id="matchupContainer" class="grid grid-cols-2 gap-3">
                <!-- Matchup buttons will be rendered here -->
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            <!-- Left: Unit Deployment -->
            <div class="xl:col-span-3">
                <div class="glass-card p-8 sticky top-12">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8 border-l-2 border-rose-600 pl-4">Tactical Units</h2>
                    <div id="layerSelector" class="space-y-3 pr-2 scroll-custom">
                        <!-- JS Renders -->
                    </div>
                    <div class="mt-10 pt-6 border-t border-white/5 flex gap-4">
                        <button onclick="toggleAll(true)" class="flex-1 py-3 text-[9px] font-black text-sky-500 border border-sky-900/30 rounded-lg hover:bg-sky-950/20 uppercase tracking-widest transition-all">All Deploy</button>
                        <button onclick="toggleAll(false)" class="flex-1 py-3 text-[9px] font-black text-slate-500 border border-slate-800 rounded-lg hover:bg-slate-900/40 uppercase tracking-widest transition-all">Clear All</button>
                    </div>
                </div>
            </div>

            <!-- Center: The Radar Battleground -->
            <div class="xl:col-span-6 flex flex-col gap-8">
                <div class="glass-card p-12 flex-1 radar-container min-h-[700px] relative">
                    <canvas id="mainRadarChart"></canvas>
                    <div class="absolute bottom-6 left-6 text-[10px] text-slate-700 font-mono">GRID SYSTEM ALPHA-9 / SECTOR: JUSTIFICATION</div>
                </div>
            </div>

            <!-- Right: Strategic Command -->
            <div class="xl:col-span-3">
                <div id="briefCard" class="glass-card h-full p-10 flex flex-col border-r-2 border-rose-500/20 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-6 opacity-10 font-black text-700">ORD-SAL</div>
                    <div class="flex justify-between items-center mb-10 relative z-10">
                        <h2 class="text-2xl font-black tracking-tighter flex items-center gap-3">
                            <span id="briefIcon" class="w-8 h-8 rounded-full bg-rose-600 flex items-center justify-center text-sm">J</span>
                            STRATEGIC BRIEF
                        </h2>
                        <span id="briefCode" class="text-[10px] font-mono text-rose-500/70 tracking-widest">READY-01</span>
                    </div>
                    
                    <div id="strategicBriefContent" class="flex-1 overflow-y-auto scroll-custom pr-4 space-y-8 relative z-10">
                        <div class="opacity-20 text-center py-40">
                            <p class="text-xs uppercase tracking-[0.5em] mb-4 font-black">Standing by for command</p>
                            <p class="text-[10px] text-slate-600">학자를 선택하시면 클릭 즉시 상세 브리핑이 출력됩니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scholars = [
            { 
                id: 0, name: '마틴 루터', color: '#ef4444', data: [10, 2, 10, 3, 9, 2, 10], group: 'Reformation',
                strategy: "[Strategic Core: Forensic] 칭의를 철저히 법정적 선언으로 규정합니다. 인간의 내적 변화나 선행(Axis 2, 6: 2점)을 칭의의 근거에서 완전히 배제하고, 오직 그리스도의 의가 전가되는 '외래적 의' 만을 강조하는 총력적 방어 전략입니다."
            },
            { 
                id: 1, name: '트렌트 공의회', color: '#3b82f6', data: [3, 9, 4, 8, 5, 10, 5], group: 'Catholic',
                strategy: "[Strategy: Infused Grace] 칭의를 단순한 선언이 아닌 '실질적 변화'와 결합합니다. 주입된 은혜(Axis 2: 9점)와 사랑으로 역사하는 신앙(Axis 6: 10점)을 통해, 인간의 내면이 실제로 의로워지는 과정을 중시하는 점진적 성화-칭의 통합 전략입니다."
            },
            { 
                id: 2, name: 'E.P. 샌더스', color: '#10b981', data: [7, 5, 2, 9, 4, 8, 4], group: 'New Perspective',
                strategy: "[Strategy: Covenantal Nominism] '율법주의'가 아닌 '언약적 율법주의'를 주장합니다. 칭의는 언약 안으로 '들어가는' 입구가 아니라, 언약 안에 '머무는' 표지임을 강조하며 유대교에 대한 기독교의 오해를 격파하는 인식론적 전환 전략입니다."
            },
            { 
                id: 3, name: 'N.T. 라이트', color: '#8b5cf6', data: [6, 4, 5, 10, 6, 7, 9], group: 'New Perspective',
                strategy: "[Strategy: Ecclesial Boundary] 칭의를 개인적 구원론에서 '교회론적 표지'로 확장합니다. 칭의의 핵심은 '누가 하나님의 백성인가'를 선언하는 것이며, 이는 종말론적 승리(Axis 7: 9점)에 기초한 언약적 선언이라는 거시적 사회 전술을 취합니다."
            },
            { 
                id: 4, name: '존 칼빈', color: '#f59e0b', data: [9, 5, 9, 6, 8, 6, 8], group: 'Reformation',
                strategy: "[Strategy: Double Grace] 루터의 법정적 칭의를 유지하되, 이를 성화(Double Grace)와 불가분하게 결합합니다. 칭의와 성화가 비록 구별되지만 결코 분리될 수 없음을 강조하여, 루터의 급진성을 목회적-윤리적 균형으로 보완하는 종합적 전략입니다."
            }
        ];

        const matchups = [
            { 
                title: "법정적 전가인가, 실재적 주입인가?", ids: [0, 1], 
                analysis: "루터 vs 트리엔트. 종교개혁의 핵심 전선입니다. 칭의가 인간 밖에서 일어나는 '법적 선언(Forensic)'인가, 아니면 인간 안에서 일어나는 '실질적 변화(Infusion)'인가를 두고 격돌합니다. 전략 포인트: Axis 3(전가)과 Axis 2(내적 변화)의 수치 격차를 주목하십시오."
            },
            { 
                title: "개인적 구원인가, 언약적 표지인가?", ids: [0, 3], 
                analysis: "루터 vs N.T. 라이트. 고전적 해석과 새 관점의 충돌입니다. 칭의를 '하나님과의 개인적 화해'로 보느냐, 아니면 '언약 공동체의 일원이 됨을 알리는 공적 표지'로 보느냐의 싸움입니다. 전략 포인트: Axis 4(언약적 소속)의 비중 차이를 분석하십시오."
            }
        ];

        let activeLayers = [true, true, true, true, true];
        let chart;

        const ctx = document.getElementById('mainRadarChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['법정적 성격', '내적 변화/주입', '의의 전가(Imputation)', '언약적 소속', '신앙의 독점성', '선행의 결합', '종말론적 선취'],
                    datasets: scholars.map((s, idx) => ({
                        label: s.name,
                        data: s.data,
                        borderColor: s.color,
                        backgroundColor: s.color + '10',
                        fill: true,
                        hidden: !activeLayers[idx],
                        pointRadius: 4,
                        borderWidth: 2
                    }))
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.05)' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            pointLabels: { color: '#475569', font: { size: 10, weight: '700' } },
                            ticks: { display: false, max: 10, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            renderUI();
            renderMatchups();
        }

        function renderUI() {
            const container = document.getElementById('layerSelector');
            container.innerHTML = scholars.map((s, idx) => `
                <button onclick="focusScholar(${idx})" 
                        class="strategic-btn w-full flex items-center gap-4 p-4 rounded-2xl text-left ${activeLayers[idx] ? 'active' : ''}" 
                        style="color: ${s.color}">
                    <div class="w-3 h-3 rounded-full shadow-[0_0_10px_currentColor]" style="background-color: ${s.color}"></div>
                    <div class="flex-1">
                        <div class="text-[12px] font-bold text-slate-100">${s.name}</div>
                        <div class="text-[8px] text-slate-500 font-mono uppercase tracking-widest">${s.group}</div>
                    </div>
                </button>
            `).join('');
        }

        function focusScholar(idx) {
            // 클릭 즉시 레이어 토글
            activeLayers[idx] = !activeLayers[idx];
            chart.data.datasets[idx].hidden = !activeLayers[idx];
            chart.update();
            renderUI();
            
            // 우측 즉시 브리핑
            const container = document.getElementById('strategicBriefContent');
            const icon = document.getElementById('briefIcon');
            const code = document.getElementById('briefCode');
            const s = scholars[idx];

            icon.innerText = "🧐";
            icon.style.backgroundColor = s.color;
            code.innerText = `JUST-0${idx + 1}`;

            container.innerHTML = `
                <div class="space-y-8 animate-in slide-in-from-right-4 duration-500">
                    <header>
                        <h3 class="text-xs font-black uppercase tracking-[0.3em] mb-4" style="color: ${s.color}">${s.group} STRATEGIC Intel</h3>
                        <h4 class="text-5xl font-black text-white leading-none tracking-tighter mb-4">${s.name}</h4>
                    </header>
                    <div class="space-y-8">
                        <section>
                            <h5 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Theological Doctrine</h5>
                            <p class="text-slate-200 text-sm leading-[1.8]">${s.strategy}</p>
                        </section>
                        <section class="p-6 bg-rose-900/10 border border-rose-500/20 rounded-2xl">
                             <h5 class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-4">Field Observation</h5>
                             <p class="text-xs text-slate-400 leading-relaxed">
                                <strong>${s.name}</strong>의 신학 지형에서 가장 높은 고지는 <strong>'${chart.data.labels[s.data.indexOf(Math.max(...s.data))]}'</strong>입니다. 
                                반면 <strong>'${chart.data.labels[s.data.indexOf(Math.min(...s.data))]}'</strong> 고지는 상대적으로 취약하게 노출되어 있습니다.
                             </p>
                        </section>
                    </div>
                </div>
            `;
        }

        function renderMatchups() {
            const container = document.getElementById('matchupContainer');
            container.innerHTML = matchups.map((m, idx) => `
                <button onclick="applyMatchup(${idx})" 
                        class="matchup-btn px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-[0.2em] text-rose-500 text-left leading-tight">
                    ${m.title}
                </button>
            `).join('');
        }

        function applyMatchup(idx) {
            const matchup = matchups[idx];
            activeLayers = activeLayers.map((_, i) => matchup.ids.includes(i));
            chart.data.datasets.forEach((d, i) => d.hidden = !matchup.ids.includes(i));
            chart.update();
            renderUI();
            
            const container = document.getElementById('strategicBriefContent');
            const icon = document.getElementById('briefIcon');
            const code = document.getElementById('briefCode');

            icon.innerText = "⚔️";
            icon.style.backgroundColor = "#e11d48";
            code.innerText = `MATCH-0${idx + 1}`;

            container.innerHTML = `
                <div class="space-y-8 animate-in slide-in-from-right-4 duration-700">
                    <header>
                        <h3 class="text-rose-500 font-black text-[10px] uppercase tracking-[0.3em] mb-4">Tactical Engagement Report</h3>
                        <h4 class="text-4xl font-black text-white leading-tight tracking-tighter">${matchup.title}</h4>
                    </header>
                    <div class="prose prose-invert">
                        <p class="text-slate-300 text-sm leading-[1.8] font-light">${matchup.analysis}</p>
                    </div>
                </div>
            `;
        }

        function toggleAll(val) {
            activeLayers = activeLayers.map(() => val);
            chart.data.datasets.forEach(d => d.hidden = !val);
            chart.update();
            renderUI();
        }

        initChart();
    </script>
</body>
</html>
